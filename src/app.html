<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="color-scheme" content="light dark" />
    <!-- No-flash theme: apply a forced light/dark choice before first paint.
         `system` (or no stored value) falls through to prefers-color-scheme. -->
    <script>
      try {
        var t = localStorage.getItem('wc2026-theme');
        if (t === 'light' || t === 'dark') document.documentElement.style.colorScheme = t;
      } catch (e) {}
    </script>
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <link
      rel="preload"
      href="%sveltekit.assets%/fonts/archivo-expanded-900.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="%sveltekit.assets%/fonts/space-mono-700.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Interactive World Cup 2026 bracket — click flags to advance teams. Share your bracket via the URL." />
    <link rel="canonical" href="https://wc2026.paulogdm.com/" />
    <meta property="og:title" content="World Cup 2026 — Interactive Bracket" />
    <meta property="og:description" content="Pick your winners in a shareable World Cup 2026 bracket." />
    <meta property="og:url" content="https://wc2026.paulogdm.com/" />
    <meta property="og:site_name" content="World Cup 2026 Bracket" />
    <meta property="og:image" content="https://wc2026.paulogdm.com/og-image.jpg" />
    <meta property="og:image:alt" content="World Cup 2026 interactive bracket preview" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="World Cup 2026 — Interactive Bracket" />
    <meta name="twitter:description" content="Pick your winners in a shareable World Cup 2026 bracket." />
    <meta name="twitter:image" content="https://wc2026.paulogdm.com/og-image.jpg" />
    <meta name="twitter:image:alt" content="World Cup 2026 interactive bracket preview" />
    <title>World Cup 2026 — Interactive Bracket</title>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
